{% extends "base.html" %}
{% block title %}Forgot Password — EduSync{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h3 class="mb-3">Forgot Password</h3>
      <p class="text-muted">Enter your register number or email to receive a password setup link.</p>
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <div class="mb-3">
          <label class="form-label">Register No or Email</label>
          <input type="text" name="identifier" class="form-control" required>
        </div>
        <button class="btn btn-primary">Send Reset Link</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
