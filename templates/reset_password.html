{% extends "base.html" %}
{% block title %}Set New Password — EduSync{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h3 class="mb-3">Set New Password</h3>
      <form method="POST" action="{{ url_for('auth.reset_password') }}">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="password_confirm" name="password_confirm" class="form-control" required>
        </div>
        <button id="submitBtn" class="btn btn-primary">Set Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  (function () {
    const pwd = document.getElementById('password');
    const confirm = document.getElementById('password_confirm');
    const submit = document.getElementById('submitBtn');
    function validate() {
      if (!pwd || !confirm || !submit) return;
      if (pwd.value !== confirm.value) {
        submit.disabled = true;
      } else {
        submit.disabled = false;
      }
    }
    if (pwd && confirm) {
      pwd.addEventListener('input', validate);
      confirm.addEventListener('input', validate);
      validate();
    }
  })();
</script>
{% endblock %}
