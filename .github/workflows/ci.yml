name: CI/CD Pipeline

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & test ─────────────────────────────────────────────────────────────
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install only the non-CV packages needed for testing
          pip install \
            flask==3.1.0 \
            flask-restx==1.3.0 \
            flask-jwt-extended==4.7.1 \
            flask-limiter==3.9.0 \
            flask-wtf==1.2.2 \
            Werkzeug==3.1.3 \
            bcrypt==4.2.1 \
            python-dotenv==1.0.1 \
            pandas==2.2.2 \
            pytest==8.3.5 \
            pytest-flask==1.3.0

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
          TUTOR_USERNAME: tutor
          TUTOR_PASSWORD: paavai123
          TUTOR_PASSWORD_HASH: ""
          USE_FIREBASE: "false"
        run: pytest tests/ -v --tb=short

  # ── Docker build check ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: attendance-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker Hub publish (only on push to main) ────────────────────────────────
  docker-publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-system:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-system:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
