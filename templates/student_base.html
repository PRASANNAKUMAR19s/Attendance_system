<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#00aa00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="AI Face Recognition Attendance System" />
  <title>{% block title %}Student Portal — Attendance System{% endblock %}</title>

  <!-- PWA -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}" />
  
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    :root { --student-primary: #00aa00; }
    .btn-student { background-color: var(--student-primary); border-color: var(--student-primary); color: #fff; }
    .btn-student:hover { background-color: #008800; border-color: #008800; color: #fff; }
    .text-student { color: var(--student-primary) !important; }
    .bg-student { background-color: var(--student-primary) !important; }
    .border-student { border-color: var(--student-primary) !important; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Student Navbar -->
  {% include 'components/navbar_student.html' %}

  <!-- Flash messages -->
  {% include 'components/alerts.html' %}

  <!-- Main content -->
  <main class="flex-grow-1 container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include 'components/footer.html' %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          crossorigin="anonymous"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  <script>
    window.onerror = function(msg) {
      if (msg && typeof msg === 'string' && 
          (msg.includes('image.png') || 
           msg.includes('model does not support') ||
           msg.includes('Screenshot'))) {
        return true;
      }
      return false;
    };
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
