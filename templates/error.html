{% extends "base.html" %}
{% block title %}{{ code }} — AI Attendance System{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
  <div class="col-md-6 text-center">
    <div class="display-1 fw-bold text-muted">{{ code }}</div>

    <a href="{{ url_for('faculty.dashboard') }}" class="btn btn-primary mt-3">

  </div>
</div>
{% endblock %}
