<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Faculty Portal — Attendance System{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    :root { --faculty-primary: #0066cc; }
    .btn-faculty { background-color: var(--faculty-primary); border-color: var(--faculty-primary); color: #fff; }
    .btn-faculty:hover { background-color: #0052a3; border-color: #0052a3; color: #fff; }
    .text-faculty { color: var(--faculty-primary) !important; }
    .bg-faculty { background-color: var(--faculty-primary) !important; }
    .border-faculty { border-color: var(--faculty-primary) !important; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Faculty Navbar -->
  {% include 'components/navbar_faculty.html' %}

  <!-- Flash messages -->
  {% include 'components/alerts.html' %}

  <!-- Main content -->
  <main class="flex-grow-1 container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  {% include 'components/footer.html' %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmHFFOVg7BEqiWVi0gSVoXbf0p6X"
          crossorigin="anonymous"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <!-- Custom JS -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
